name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast tier: pure-Rust unit + integration tests that don't touch the
  # Risc0 toolchain or a live sequencer. Runs on every push.
  test-fast:
    name: Fast tests (no sequencer, no guest build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (matches workspace pin)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install logos-blockchain-circuits prerequisite
        run: |
          set -euo pipefail
          cd /tmp
          curl -fLO https://github.com/logos-blockchain/logos-blockchain-circuits/releases/download/v0.4.2/logos-blockchain-circuits-v0.4.2-linux-x86_64.tar.gz
          tar -xzf logos-blockchain-circuits-v0.4.2-linux-x86_64.tar.gz
          mv logos-blockchain-circuits-v0.4.2-linux-x86_64 ~/.logos-blockchain-circuits

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (our crates only)
        run: |
          cargo clippy -p whistleblower-core -p document-indexing \
            -p whistleblower-mock-adapter --release -- -D warnings

      - name: cargo test (excludes guest + spike + adapter live tests)
        env:
          RISC0_SKIP_BUILD: "1"
        run: |
          cargo test --workspace \
            --exclude whistleblower-methods \
            --exclude whistleblower-programs \
            --exclude anchor-spike \
            --release

  # Real on-push end-to-end check against the PUBLIC LEZ testnet.
  #
  # This replaces the previous `test-real-proof` job, which was gated to
  # `workflow_dispatch` and started with `exit 1` — i.e. it never ran. That was
  # the honest gap that closed PR #58. This job runs on every push/PR with no
  # secrets, no localnet, and no mock: it re-queries the deployed
  # whistleblower-registry program's transactions straight from the public
  # sequencer's JSON-RPC and fails if any are missing. It proves the on-chain
  # evidence in TESTNET_PROOF.md is live. (The richer wallet-based PDA decode is
  # scripts/verify-testnet.sh; the full deploy lives in
  # anchor_spike/src/bin/testnet_lifecycle.rs.)
  verify-testnet:
    name: Verify public-testnet evidence (read-only, on push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Re-query deployed transactions from the public LEZ testnet
        run: bash scripts/ci-verify-testnet.sh

  # OPTIONAL (disabled by default): fresh real anchor on every push.
  #
