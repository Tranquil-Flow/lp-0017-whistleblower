  # would go further — submit a *new* anchor against the live testnet program on
  # each push and re-query it — fully satisfying "real e2e on push". It is left
  # commented because it needs (a) the LEZ `wallet` built from tag v0.1.2 in the
  # runner and (b) a funded-testnet-account secret, which is a maintainer/secrets
  # decision (and it adds testnet state on every push). Enable by uncommenting
