[scaffold]
version = "0.2.0"
# cache_root: directory for scaffold's build/repo caches.
# Resolution order when resolving at runtime:
#   1. LOGOS_SCAFFOLD_CACHE_ROOT env var
#   2. cache_root below (uncomment to pin)
#   3. $XDG_CACHE_HOME/logos-scaffold
#   4. $HOME/.cache/logos-scaffold
# Relative values resolve against this file's directory.
# cache_root = ".scaffold/cache"

# NOTE: `path` (the local repo cache) is intentionally omitted — lgs resolves it
# at runtime per the cache_root order above, so it stays portable across clones.
# `pin` here is the rc1 commit used for the LOCAL sequencer (historical
# corroboration). The PUBLIC TESTNET deploy uses the rc3 build (cf3639d8) pinned
# in the workspace Cargo.toml — see TESTNET_PROOF.md.
[repos.lez]
url = "https://github.com/logos-blockchain/logos-execution-zone.git"
source = "https://github.com/logos-blockchain/logos-execution-zone.git"
pin = "35d8df0d031315219f94d1546ceb862b0e5b208f"

[repos.spel]
url = "https://github.com/logos-co/spel.git"
source = "https://github.com/logos-co/spel.git"
pin = "ed3bbedb4b684645da05455d30a4a0be7cc4dfe0"

[repos.basecamp]
source = "https://github.com/logos-co/logos-basecamp"
pin = "a746cdbc521f72ee22c5a4856fd17a9802bb9d69"
build = "nix-flake"
attr = "app"

[wallet]
home_dir = ".scaffold/wallet"

[framework]
kind = "default"
version = "0.1.0"

[framework.idl]
spec = "lssa-idl/0.1.0"
path = "idl"

[localnet]
port = 3040
risc0_dev_mode = false

[basecamp]
port_base = 60000
port_stride = 10

[modules.delivery_module]
flake = "github:logos-co/logos-delivery-module/1fde1566291fe062b98255003b9166b0261c6081#lgx"
role = "dependency"

[modules.storage_module]
flake = "github:logos-co/logos-storage-module/b1d82a32c1ba27e20d07b7ed8555fd45b02adb4e#lgx"
role = "dependency"

[modules.whistleblower]
flake = "path:.#lgx"
role = "project"
